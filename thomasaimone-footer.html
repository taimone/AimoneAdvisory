<!-- thomasaimone.com — Home Page FOOTER custom code -->
<!-- Webflow Admin: Home page > Page Settings > Custom Code > Footer Code -->

<style>
.ta-cert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;margin-top:20px;}
.ta-cert-card{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid rgba(255,255,255,0.07);border-radius:5px;}
.ta-cert-logo{flex:0 0 44px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden;}
.ta-cert-logo img{max-width:34px;max-height:34px;object-fit:contain;}
.ta-cert-name{font-size:0.78rem;font-weight:600;color:#e8e8e8;line-height:1.3;margin-bottom:3px;}
.ta-cert-meta{font-size:0.68rem;color:rgba(255,255,255,0.35);}
</style>

<script>
(function(){
  var CERTS = [
    {n:'FinOps Certified Practitioner', i:'FinOps Foundation', d:'Jul 2026', c:'#00B4D8', a:'FCP',
     l:'https://finops.org/wp-content/uploads/2022/09/FinOps-Foundation-logo.svg'},
    {n:'AWS Certified Solutions Architect – Associate', i:'Amazon Web Services', d:'Aug 2017', c:'#FF9900', a:'SAA',
     l:'https://upload.wikimedia.org/wikipedia/commons/9/93/Amazon_Web_Services_Logo.svg'},
    {n:'AWS Certified Cloud Practitioner', i:'Amazon Web Services', d:'Jan 2019', c:'#FF9900', a:'CCP',
     l:'https://upload.wikimedia.org/wikipedia/commons/9/93/Amazon_Web_Services_Logo.svg'},
    {n:'Certified ScrumMaster', i:'Scrum Alliance', d:'Apr 2017', c:'#009B77', a:'CSM',
     l:'https://www.scrumalliance.org/themes/sa/img/logos/SA_horizontal_logo.png'},
    {n:'Certified Scrum Product Owner', i:'Scrum Alliance', d:'Jun 2016', c:'#009B77', a:'CSPO',
     l:'https://www.scrumalliance.org/themes/sa/img/logos/SA_horizontal_logo.png'},
    {n:'Microsoft Certified Systems Engineer', i:'Microsoft', d:'Feb 2001', c:'#0078D4', a:'MCSE',
     l:'https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg'},
    {n:'Microsoft Certified Professional', i:'Microsoft', d:'Oct 2000', c:'#0078D4', a:'MCP',
     l:'https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg'},
    {n:'CompTIA A+', i:'CompTIA', d:'Jan 2003', c:'#C8202E', a:'A+',
     l:'https://upload.wikimedia.org/wikipedia/en/a/ac/CompTIA_logo.svg'}
  ];

  document.addEventListener('DOMContentLoaded', function(){
    // Find the Certifications column inside #credentials
    var credSection = document.getElementById('credentials');
    if (!credSection) return;

    var certCol = null;
    credSection.querySelectorAll('.ta-cred-h').forEach(function(h){
      if (h.textContent.trim() === 'Certifications') certCol = h.parentNode;
    });
    if (!certCol) return;

    // Remove existing plain-text cert items
    certCol.querySelectorAll('.ta-cred-item').forEach(function(el){ el.remove(); });

    // Build visual cert grid
    var grid = document.createElement('div');
    grid.className = 'ta-cert-grid';

    CERTS.forEach(function(c){
      var card = document.createElement('div');
      card.className = 'ta-cert-card';

      var logoDiv = document.createElement('div');
      logoDiv.className = 'ta-cert-logo';

      var img = new Image();
      img.alt = c.a;
      img.src = c.l;
      img.onerror = (function(cc, ld){ return function(){
        this.style.display = 'none';
        ld.style.background = cc.c + '22';
        var sp = document.createElement('span');
        sp.style.cssText = 'font-size:9px;font-weight:800;color:' + cc.c + ';text-align:center;line-height:1.1;padding:2px;';
        sp.textContent = cc.a;
        ld.appendChild(sp);
      };})(c, logoDiv);
      logoDiv.appendChild(img);

      var info = document.createElement('div');
      var nm = document.createElement('div');
      nm.className = 'ta-cert-name';
      nm.textContent = c.n;
      var mt = document.createElement('div');
      mt.className = 'ta-cert-meta';
      mt.textContent = c.i + ' · ' + c.d;
      info.appendChild(nm);
      info.appendChild(mt);

      card.appendChild(logoDiv);
      card.appendChild(info);
      grid.appendChild(card);
    });

    certCol.appendChild(grid);
  });
})();
</script>
