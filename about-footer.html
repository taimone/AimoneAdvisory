    pageBody.appendChild(certSection);

    var grid = document.getElementById('aa-cert-grid');
    CERTS.forEach(function(c){
      var card = document.createElement('div');
      card.style.cssText = 'display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid rgba(255,255,255,0.08);border-radius:6px;';

      img.alt = c.a; img.src = c.l;
      img.style.cssText = 'max-width:36px;max-height:36px;object-fit:contain;';

        sp.style.cssText='font-size:9px;font-weight:800;color:'+cc.c+';text-align:center;line-height:1.1;padding:2px;';

      };})(c,lw);
      lw.appendChild(img);
      var info = document.createElement('div');
      var nm = document.createElement('div');
      nm.style.cssText = 'font-size:0.82rem;font-weight:600;color:#fff;line-height:1.3;margin-bottom:3px;';
      nm.textContent = c.n;
      var mt = document.createElement('div');
      mt.style.cssText = 'font-size:0.7rem;color:rgba(255,255,255,0.4);';
      mt.textContent = c.i + ' · ' + c.d;
      info.appendChild(nm); info.appendChild(mt);
      card.appendChild(lw); card.appendChild(info);
      grid.appendChild(card);

    anchor.style.cssText = 'scroll-margin-top:80px;';
    var section = document.createElement('section');
    section.style.cssText = 'padding:80px 5%;border-top:1px solid rgba(255,255,255,0.1);';
    section.innerHTML = [
      '<div class="max-width-large" style="max-width:800px;margin:0 auto;">',
      '<h2 class="heading-style-h4" style="color:#fff;margin-bottom:16px;">Nonprofit &amp; Pro Bono Advisory</h2>',

      '<p style="color:rgba(255,255,255,0.65);font-size:1rem;line-height:1.7;margin-bottom:32px;">',
      'This isn’t a discount program. It’s a commitment to doing the work that matters even when the economics don’t. If your organization is doing something important in your community and you’re navigating a crossroads — reach out. No charge, no commitment from this first conversation.',

      '<a href="/contact" class="button" style="display:inline-block;">Start the Conversation</a>',
      '</div>'
    ].join('');
    pageBody.appendChild(anchor);
    pageBody.appendChild(section);
  });
})();
</script>
